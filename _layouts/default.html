<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET ========== */
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    /* ========== TOKENS ========== */
    :root {
      --bg: #0c0c0e;
      --bg-card: #141418;
      --bg-card-hover: #1a1a20;
      --text: #e8e6e3;
      --text-dim: #8a8a8e;
      --accent: #5ce1c5;
      --accent-glow: rgba(92,225,197,0.10);
      --accent2: #a78bfa;
      --border: rgba(255,255,255,0.06);
      --radius: 16px;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ========== GRAIN OVERLAY ========== */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 9999;
    }

    /* ========== AMBIENT GLOW ========== */
    .glow-orb {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb--teal   { background: var(--accent);  top: -200px; right: -100px; }
    .glow-orb--purple { background: var(--accent2); bottom: -200px; left: -100px; }

    /* ========== NAV ========== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: rgba(12,12,14,0.72);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      color: var(--text-dim);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ========== LAYOUT ========== */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
    section   { position: relative; z-index: 1; }

    /* ========== HERO ========== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 80px;
    }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0; animation: fadeUp .8s .2s forwards;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 7vw, 88px);
      line-height: 1.05;
      font-weight: 400;
      margin-bottom: 28px;
      opacity: 0; animation: fadeUp .8s .4s forwards;
    }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero-sub {
      font-size: 18px;
      color: var(--text-dim);
      max-width: 540px;
      line-height: 1.7;
      opacity: 0; animation: fadeUp .8s .6s forwards;
    }
    .hero-tags {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-top: 36px;
      opacity: 0; animation: fadeUp .8s .8s forwards;
    }
    .tag {
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 13px; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-dim);
      transition: all .3s;
    }
    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }
    .scroll-cue {
      position: absolute;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--text-dim);
      font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      opacity: 0; animation: fadeUp .8s 1s forwards;
    }
    .scroll-cue .arrow {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--text-dim), transparent);
      animation: pulse 2s infinite;
    }

    /* ========== SECTION HEADERS ========== */
    .section-label {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 400;
      margin-bottom: 48px;
    }

    /* ========== PROJECT CARDS ========== */
    .projects { padding: 120px 0; }
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      transition: all .4s cubic-bezier(.19,1,.22,1);
      position: relative;
      overflow: hidden;
      display: block;
    }
    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity .4s;
    }
    .project-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255,255,255,.1);
      transform: translateY(-4px);
    }
    .project-card:hover::before { opacity: 1; }
    .project-card .card-num {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .project-card h3 {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 400;
      margin-bottom: 12px;
    }
    .project-card p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .card-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(92,225,197,.08);
      color: var(--accent);
    }

    /* ========== ABOUT ========== */
    .about { padding: 120px 0; }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: start;
    }
    .about-text {
      font-size: 16px;
      color: var(--text-dim);
      line-height: 1.8;
    }
    .about-text p + p { margin-top: 20px; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      transition: border-color .3s;
    }
    .stat-card:hover { border-color: rgba(92,225,197,.2); }
    .stat-num {
      font-family: var(--font-display);
      font-size: 36px;
      color: var(--accent);
      display: block;
      margin-bottom: 6px;
    }
    .stat-label { font-size: 13px; color: var(--text-dim); }

    /* ========== POSTS ========== */
    .posts { padding: 120px 0; }
    .post-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      transition: all .3s;
    }
    .post-item:first-child { border-top: 1px solid var(--border); }
    .post-item:hover { padding-left: 16px; }
    .post-item:hover .post-title { color: var(--accent); }
    .post-title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 400;
      transition: color .3s;
    }
    .post-date {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ========== PAGE CONTENT (for sub-pages) ========== */
    .page-content {
      padding-top: 140px;
      padding-bottom: 120px;
      min-height: 80vh;
    }
    .page-content h1 {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 400;
      margin-bottom: 40px;
    }
    .page-content h2 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 400;
      margin-top: 48px;
      margin-bottom: 16px;
    }
    .page-content h3 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      margin-top: 32px;
      margin-bottom: 12px;
    }
    .page-content p {
      color: var(--text-dim);
      line-height: 1.8;
      margin-bottom: 16px;
      max-width: 680px;
    }
    .page-content a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .page-content a:hover { opacity: .8; }
    .page-content ul, .page-content ol {
      color: var(--text-dim);
      padding-left: 24px;
      margin-bottom: 16px;
      line-height: 1.8;
    }
    .page-content code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-card);
      padding: 2px 8px;
      border-radius: 6px;
    }
    .page-content pre {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      overflow-x: auto;
      margin-bottom: 24px;
    }
    .page-content pre code {
      background: none;
      padding: 0;
    }
    .page-content img {
      border-radius: var(--radius);
      margin: 24px 0;
    }

    /* ========== FOOTER ========== */
    footer {
      padding: 60px 0;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a {
      color: var(--text-dim);
      font-size: 14px;
      transition: color .3s;
    }
    .footer-links a:hover { color: var(--accent); }
    .footer-copy { font-size: 13px; color: var(--text-dim); }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity: .3; }
      50%     { opacity: 1; }
    }
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: all .8s cubic-bezier(.19,1,.22,1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { gap: 20px; }
      .nav-links a { font-size: 13px; }
      .container { padding: 0 20px; }
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .project-grid { grid-template-columns: 1fr; }
      .post-item { flex-direction: column; gap: 6px; }
      .footer-inner { flex-direction: column; gap: 20px; text-align: center; }
    }
  </style>
</head>
<body>

<div class="glow-orb glow-orb--teal"></div>
<div class="glow-orb glow-orb--purple"></div>

<nav>
  <a href="{{ '/' | relative_url }}" class="nav-logo">SP</a>
  <div class="nav-links">
    <a href="{{ '/' | relative_url }}#projects">Projects</a>
    <a href="{{ '/' | relative_url }}#about">About</a>
    <a href="{{ '/' | relative_url }}#posts">Posts</a>
    {% if site.github_username %}
    <a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a>
    {% endif %}
  </div>
</nav>

{{ content }}

<footer>
  <div class="container footer-inner">
    <div class="footer-links">
      {% if site.github_username %}
      <a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a>
      {% endif %}
      {% if site.linkedin_username %}
      <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank">LinkedIn</a>
      {% endif %}
    </div>
    <div class="footer-copy">&copy; {{ 'now' | date: '%Y' }} {{ site.author | default: site.title }}</div>
  </div>
</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
